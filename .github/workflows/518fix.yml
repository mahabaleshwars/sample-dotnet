name: Validate #518 (non-root container)

on: workflow_dispatch

jobs:
  after-fix-nonroot:
    runs-on: ubuntu-latest
    container:
      image: buildpack-deps:jammy-curl   # has curl, wget, ca-certificates; no dotnet
      options: --user 1001:0 -e HOME=/tmp/nrhome
    steps:
      - name: Prove non-root + no write to /usr/share
        run: |
          id
          mkdir -p /tmp/nrhome
          mkdir /usr/share/dotnet 2>&1 || echo "EXPECTED: cannot write /usr/share"
          command -v curl && echo "curl present"

      - uses: actions/checkout@v4

      - uses: mahabaleshwars/setup-dotnet@feature/518-setup-fallback
        with:
          dotnet-version: '8.0.x'

      - name: Analyze
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: '1'
        run: |
          echo "DOTNET_ROOT=$DOTNET_ROOT"
          dotnet --version
          case "$DOTNET_ROOT" in
            */.dotnet) echo "PASS: fell back to writable HOME ($DOTNET_ROOT)" ;;
            *) echo "FAIL: got '$DOTNET_ROOT'"; exit 1 ;;
          esac
