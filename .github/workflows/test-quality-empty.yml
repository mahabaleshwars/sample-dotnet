name: Test dotnet-quality empty string behavior via curl

on:
  workflow_dispatch:

jobs:
  test-quality-empty-curl:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        quality: ['']
        dotnet-version: ['10', '10.0', '9.0']
    steps:
      - name: Log test parameters
        shell: bash
        run: |
          echo "========================================="
          echo "  TEST: dotnet-install scripts via curl"
          echo "========================================="
          echo "OS:             ${{ matrix.os }}"
          echo "dotnet-version: ${{ matrix.dotnet-version }}"
          echo "dotnet-quality: '${{ matrix.quality }}'"
          echo "quality empty?: ${{ matrix.quality == '' }}"
          echo "========================================="

      - name: Setup dotnet via direct curl command
        id: setup
        shell: bash
        continue-on-error: true
        run: |
          echo "========================================="
          echo "  DOWNLOADING AND RUNNING INSTALL SCRIPT"
          echo "========================================="
          
          # We use --channel to match the dotnet-version and --quality for the quality flag
          # If quality is empty, we don't pass the flag to see how the script handles default behavior,
          # OR we pass it explicitly as an empty string depending on how you want to test it.
          # Here we pass it directly to see if the script accepts an empty string.
          
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "Downloading dotnet-install.ps1..."
            curl -sSL https://dot.net/v1/dotnet-install.ps1 -o dotnet-install.ps1
            
            echo "Executing PowerShell script..."
            pwsh -NoProfile -ExecutionPolicy unrestricted -Command "./dotnet-install.ps1 -Channel ${{ matrix.dotnet-version }} -Quality '${{ matrix.quality }}'"
          else
            echo "Downloading dotnet-install.sh..."
            curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
            chmod +x dotnet-install.sh
            
            echo "Executing Bash script..."
            ./dotnet-install.sh --channel ${{ matrix.dotnet-version }} --quality "${{ matrix.quality }}"
          fi

      - name: Log setup outcome
        shell: bash
        run: |
          echo "========================================="
          echo "  RESULT"
          echo "========================================="
          echo "Step outcome: ${{ steps.setup.outcome }}"
          echo "========================================="

      - name: Add dotnet to PATH
        if: steps.setup.outcome == 'success'
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "$LOCALAPPDATA/Microsoft/dotnet" >> $GITHUB_PATH
          else
            echo "$HOME/.dotnet" >> $GITHUB_PATH
          fi

      - name: Verify installed dotnet
        if: steps.setup.outcome == 'success'
        shell: bash
        run: |
          echo "========================================="
          echo "  VERIFICATION"
          echo "========================================="
          dotnet --version
          echo ""
          echo "dotnet --list-sdks:"
          dotnet --list-sdks
          echo ""
          echo "dotnet --list-runtimes:"
          dotnet --list-runtimes
          echo "========================================="

      - name: Log failure details
        if: steps.setup.outcome == 'failure'
        shell: bash
        run: |
          echo "========================================="
          echo "  SETUP FAILED"
          echo "========================================="
          echo "The curl/install script failed with:"
          echo "  dotnet-version: ${{ matrix.dotnet-version }}"
          echo "  dotnet-quality: '${{ matrix.quality }}'"
          echo "========================================="
  test-major-version:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        quality: ['']
        dotnet-version: ['10', '9', '8']
    steps:
      - name: Test Major version without minor version
        uses: actions/setup-dotnet@v5
        with:
            dotnet-version: ${{ matrix.dotnet-version }}
            dotnet-quality: ${{ matrix.quality }}
