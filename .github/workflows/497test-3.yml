name: Test dotnet-channel inputs (setup-dotnet vs install-script)

on:
  workflow_dispatch:

jobs:
  # ── Original: raw install script with --dry-run ────────────────────────────
  test-install-script:
    name: install-script
    runs-on: ubuntu-latest
    steps:
      - name: Download install script
        run: curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh && chmod +x dotnet-install.sh

      - name: Test --channel LTS
        run: ./dotnet-install.sh --channel LTS --dry-run

      - name: Test --channel STS
        run: ./dotnet-install.sh --channel STS --dry-run

      - name: Test --channel 8.0
        run: ./dotnet-install.sh --channel 8.0 --dry-run

      - name: Test --channel 8.0.1xx
        run: ./dotnet-install.sh --channel 8.0.1xx --dry-run

      - name: Test --version latest (defaults to LTS channel)
        run: ./dotnet-install.sh --version latest --dry-run

      - name: Test --channel 8.0 --quality ga
        run: ./dotnet-install.sh --channel 8.0 --quality ga --dry-run

      - name: Test --channel LTS --quality preview
        run: ./dotnet-install.sh --channel LTS --quality preview --dry-run

  # ── New: same combinations via setup-dotnet@v5 ────────────────────────────
  test-setup-dotnet:
    name: setup-dotnet
    runs-on: ubuntu-latest
    steps:
      - name: Test dotnet-version:latest dotnet-channel:LTS
        uses: mahabaleshwars/setup-dotnet@feature/497-dotnet-version-latest-keyword
        with:
          dotnet-version: latest
          dotnet-channel: LTS
      - run: dotnet --version

      - name: Test dotnet-version:latest dotnet-channel:STS
        uses: mahabaleshwars/setup-dotnet@feature/497-dotnet-version-latest-keyword
        with:
          dotnet-version: latest
          dotnet-channel: STS
      - run: dotnet --version

      - name: Test dotnet-version:8.0 (equivalent to --channel 8.0)
        uses: mahabaleshwars/setup-dotnet@feature/497-dotnet-version-latest-keyword
        with:
          dotnet-version: 8.0
      - run: dotnet --version

      - name: Test dotnet-version:8.0.1xx (equivalent to --channel 8.0.1xx)
        uses: mahabaleshwars/setup-dotnet@feature/497-dotnet-version-latest-keyword
        with:
          dotnet-version: 8.0.1xx
      - run: dotnet --version

      - name: Test dotnet-version:latest (equivalent to --version latest)
        uses: mahabaleshwars/setup-dotnet@feature/497-dotnet-version-latest-keyword
        with:
          dotnet-version: latest
      - run: dotnet --version

      - name: Test dotnet-version:8.0 dotnet-quality:ga (equivalent to --channel 8.0 --quality ga)
        uses: mahabaleshwars/setup-dotnet@feature/497-dotnet-version-latest-keyword
        with:
          dotnet-version: 8.0
          dotnet-quality: ga
      - run: dotnet --version

      - name: Test dotnet-version:latest dotnet-channel:LTS dotnet-quality:preview (equivalent to --channel LTS --quality preview)
        uses: mahabaleshwars/setup-dotnet@feature/497-dotnet-version-latest-keyword
        with:
          dotnet-version: latest
          dotnet-channel: LTS
          dotnet-quality: preview
      - run: dotnet --version
