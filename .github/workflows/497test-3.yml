name: Test dotnet-install script channels

on:
  workflow_dispatch:
  
jobs:
  test-install-script:
    runs-on: ubuntu-latest
    steps:
      - name: Download install script
        run: curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh && chmod +x dotnet-install.sh

      - name: Test --channel LTS
        run: ./dotnet-install.sh --channel LTS --dry-run

      - name: Test --channel STS
        run: ./dotnet-install.sh --channel STS --dry-run

      - name: Test --channel 8.0
        run: ./dotnet-install.sh --channel 8.0 --dry-run

      - name: Test --channel 8.0.1xx
        run: ./dotnet-install.sh --channel 8.0.1xx --dry-run

      - name: Test --version latest (defaults to LTS channel)
        run: ./dotnet-install.sh --version latest --dry-run

      - name: Test --channel 8.0 --quality ga
        run: ./dotnet-install.sh --channel 8.0 --quality ga --dry-run

      - name: Test --channel LTS --quality preview
        run: ./dotnet-install.sh --channel LTS --quality preview --dry-run
