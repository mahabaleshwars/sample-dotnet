name: Validate dotnet-runtime (sample-dotnet)

on:
  workflow_dispatch:

env:
  ACTION_REF: mahabaleshwars/setup-dotnet@feature/352-runtime-only-input

jobs:
  # 1. Install runtimes only — core issue #352 scenario
  runtime-only:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Snapshot pre-existing SDKs
        id: pre
        shell: bash
        run: |
          echo "SDKs before:"; (dotnet --list-sdks || true)
          echo "count=$(dotnet --list-sdks 2>/dev/null | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Setup dotnet (runtimes only)
        uses: mahabaleshwars/setup-dotnet@feature/352-runtime-only-input
        with:
          dotnet-runtime: |
            8.0.x
            9.0.x

      - name: Verify requested runtimes are installed
        shell: bash
        run: |
          echo "Installed runtimes:"; dotnet --list-runtimes
          dotnet --list-runtimes | grep -q "Microsoft.NETCore.App 8." || { echo "::error::.NET 8 runtime missing"; exit 1; }
          dotnet --list-runtimes | grep -q "Microsoft.NETCore.App 9." || { echo "::error::.NET 9 runtime missing"; exit 1; }
          dotnet --list-runtimes | grep -q "Microsoft.AspNetCore.App 8." || { echo "::error::ASP.NET Core 8 runtime missing"; exit 1; }
          dotnet --list-runtimes | grep -q "Microsoft.AspNetCore.App 9." || { echo "::error::ASP.NET Core 9 runtime missing"; exit 1; }

      - name: Verify the action added no SDK
        shell: bash
        run: |
          echo "SDKs after:"; (dotnet --list-sdks || true)
          after=$(dotnet --list-sdks 2>/dev/null | wc -l | tr -d ' ')
          before=${{ steps.pre.outputs.count }}
          echo "SDK count before=$before after=$after"
          [ "$after" -eq "$before" ] || { echo "::error::dotnet-runtime installed an SDK ($before -> $after)"; exit 1; }

  # 2. End-to-end: build & run a REAL multi-target test project on installed runtimes
  multitarget-e2e:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      # Install latest SDK to build with, PLUS runtimes 8 and 9 to run against
      - name: Setup dotnet (SDK 10 + runtimes 8 & 9)
        uses: mahabaleshwars/setup-dotnet@feature/352-runtime-only-input
        with:
          dotnet-version: '10.0.x'
          dotnet-runtime: |
            8.0.x
            9.0.x

      - name: Scaffold a multi-target xUnit test project
        shell: bash
        run: |
          mkdir -p e2e/MultiTargetTests && cd e2e/MultiTargetTests

          cat > MultiTargetTests.csproj <<'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFrameworks>net8.0;net9.0</TargetFrameworks>
              <Nullable>enable</Nullable>
              <IsPackable>false</IsPackable>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="Microsoft.NET.Test.Sdk" Version="17.11.1" />
              <PackageReference Include="xunit" Version="2.9.2" />
              <PackageReference Include="xunit.runner.visualstudio" Version="2.8.2" />
            </ItemGroup>
          </Project>
          EOF

          cat > RuntimeTests.cs <<'EOF'
          using System;
          using System.Runtime.InteropServices;
          using Xunit;

          public class RuntimeTests
          {
              [Fact]
              public void PrintsRuntimeVersion()
              {
                  // Emitted per target framework so we can eyeball it in logs
                  Console.WriteLine($"Running on .NET: {RuntimeInformation.FrameworkDescription}");
                  Assert.StartsWith(".NET", RuntimeInformation.FrameworkDescription);
              }

              [Fact]
              public void MajorVersionMatchesTargetFramework()
              {
          #if NET8_0
                  Assert.Equal(8, Environment.Version.Major);
          #elif NET9_0
                  Assert.Equal(9, Environment.Version.Major);
          #endif
              }
          }
          EOF

      - name: Restore & build (both target frameworks)
        working-directory: e2e/MultiTargetTests
        run: dotnet build -c Release

      - name: Test on .NET 8 runtime
        working-directory: e2e/MultiTargetTests
        run: dotnet test -c Release -f net8.0 --no-build

      - name: Test on .NET 9 runtime
        working-directory: e2e/MultiTargetTests
        run: dotnet test -c Release -f net9.0 --no-build

  # 3. Backward compatibility — SDK only, no dotnet-runtime
  sdk-only-backcompat:
    runs-on: ubuntu-latest
    steps:
      - name: Setup dotnet (SDK only)
        uses: mahabaleshwars/setup-dotnet@feature/352-runtime-only-input
        with:
          dotnet-version: '8.0.x'
      - name: Verify SDK installed
        run: |
          dotnet --list-sdks
          dotnet --list-sdks | grep -q "8." || { echo "::error::.NET 8 SDK missing"; exit 1; }
